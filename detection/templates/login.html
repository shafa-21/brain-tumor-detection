<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NeuroScan AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #020617;
            --accent: #2dd4bf;
            --accent-glow: rgba(45, 212, 191, 0.15);
            --glass: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-muted: #94a3b8;
            --text-bright: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-bright);
            overflow-y: auto;
            min-height: 100vh;
        }

        /* --- Dynamic Background --- */
        .glow-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: drift 25s infinite alternate;
        }

        .orb-1 { width: 600px; height: 600px; background: var(--accent-glow); top: -10%; right: -10%; }
        .orb-2 { width: 500px; height: 500px; background: rgba(56, 189, 248, 0.1); bottom: -15%; left: -10%; animation-delay: -7s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(80px, 40px) scale(1.1); }
        }

        /* --- Navbar --- */
        .navbar {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--accent) !important;
            letter-spacing: -0.5px;
        }

        /* --- Login Card --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            margin: 2rem 0;
        }

        .form-label-custom {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            background: rgba(2, 6, 23, 0.6) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 12px;
            color: white !important;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.2);
            background: rgba(2, 6, 23, 0.8) !important;
        }

        /* --- Buttons --- */
        .btn-primary {
            background: var(--accent);
            border: none;
            color: #020617;
            font-weight: 800;
            border-radius: 12px;
            padding: 14px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(45, 212, 191, 0.3);
        }

        .btn-outline-info {
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 10px;
            background: transparent;
            font-weight: 600;
        }

        .btn-outline-info:hover {
            background: var(--accent);
            color: #020617;
        }

        .text-accent { color: var(--accent) !important; }

        .fade-up {
            animation: fadeUp 0.8s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>

<div class="glow-wrapper">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
</div>


<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 100px);">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="glass-card fade-up">

                <div class="text-center mb-5">
                    <div class="mb-3 d-inline-block p-3 rounded-circle" style="background: rgba(45, 212, 191, 0.1);">
                        <i class="fa-solid fa-shield-halved fa-2x text-accent"></i>
                    </div>
                    <h2 class="fw-bold mb-1 text-white">Welcome Back</h2>
                    <p class="small text-white-40"">Secure Patient & Doctor Portal</p>
                </div>

                {% if form.errors %}
                <div class="error-box">
                    <i class="fas fa-circle-exclamation me-2"></i>
                    <strong>Authentication failed:</strong>
                    <div class="mt-1 opacity-75" style="font-size: 0.75rem;">Invalid username or password.</div>
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label-custom">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter your ID" required>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label class="form-label-custom">Password</label>
                        </div>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-4 shadow-sm">
                        Sign In to Dashboard
                    </button>



                    <div class="text-center mt-4">
                        <span class="small text-white-50">New to NeuroScan? </span>
                        <a href="{% url 'signup' %}" class="small text-accent fw-bold text-decoration-none ms-1">
                            Create Account
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
